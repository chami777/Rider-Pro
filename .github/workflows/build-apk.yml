name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java (Required for Android Build)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap (Bypass Prompts)
        run: |
          mkdir -p ~/.bubblewrap
          echo '{"jdkPath":"'"$JAVA_HOME"'","androidSdkPath":"'"$ANDROID_HOME"'"}' > ~/.bubblewrap/config.json

      - name: Initialize Bubblewrap Project
        run: |
          yes '' | bubblewrap init --manifest="https://chami777.github.io/Rider-Pro/manifest.json"
          
      - name: Build APK and AAB
        run: yes '' | bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rider-pro-apk
          path: app-release-signed.apk

      - name: Upload AAB (For Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: rider-pro-aab
          path: app-release-bundle.aab

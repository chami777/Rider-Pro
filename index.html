<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Pro Manager</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #1c1e21;
            --text-muted: #65676b;
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --pickme: #007bff;
            --uber: #000000;
            --direct: #fd7e14;
            --border-radius: 16px;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
            --active-input: rgba(0, 123, 255, 0.2);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e4e6eb;
            --text-muted: #b0b3b8;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --pickme: #3b82f6;
            --uber: #ffffff;
            --direct: #f59e0b;
            --shadow: 0 4px 15px rgba(0,0,0,0.3);
            --active-input: rgba(59, 130, 246, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; transition: background-color 0.3s, color 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; padding-bottom: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 5px 0; }
        .header h1 { font-size: 22px; font-weight: 700; }
        .theme-toggle { background: var(--card-bg); border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; cursor: pointer; box-shadow: var(--shadow); }
        .card { background-color: var(--card-bg); padding: 20px; border-radius: var(--border-radius); box-shadow: var(--shadow); margin-bottom: 15px; }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }

        /* Speed Meter */
        .speed-card { text-align: center; padding: 15px; background: linear-gradient(135deg, var(--card-bg), var(--bg-color)); border: 2px solid var(--primary); }
        .speed-value { font-size: 48px; font-weight: 800; color: var(--primary); font-family: 'Courier New', Courier, monospace; line-height: 1; }
        .speed-unit { font-size: 16px; font-weight: bold; color: var(--text-muted); }
        .gps-status { font-size: 12px; color: var(--danger); margin-top: 5px; }

        /* Inputs */
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--text-muted); }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid rgba(150,150,150,0.2); border-radius: 10px; font-size: 15px; background-color: var(--bg-color); color: var(--text-color); outline: none; }
        .row { display: flex; gap: 10px; }
        .row .input-group { flex: 1; }

        /* Custom Keyboard Numpad */
        .calc-input { cursor: pointer; text-align: right; font-size: 18px !important; font-weight: bold; }
        .calc-input.active { border: 2px solid var(--primary) !important; background-color: var(--active-input) !important; }
        
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .numpad-btn { background-color: var(--bg-color); border: 1px solid rgba(150,150,150,0.2); padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; color: var(--text-color); cursor: pointer; }
        .numpad-btn:active { background-color: var(--primary); color: white; }
        .numpad-btn.action { background-color: rgba(220,53,69,0.1); color: var(--danger); }
        .quick-cash-row { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; }
        .quick-cash-row button { flex: 0 0 auto; padding: 8px 12px; border-radius: 20px; border: 1px solid var(--primary); background: transparent; color: var(--primary); font-weight: bold; cursor: pointer; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; color: white; background-color: var(--primary); cursor: pointer; box-shadow: 0 4px 6px rgba(0,123,255,0.2); }

        /* Chart & Summary */
        .chart-container { position: relative; height: 180px; width: 100%; margin-bottom: 20px; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .summary-box { padding: 10px; border-radius: 12px; text-align: center; background-color: var(--bg-color); }
        .summary-box h3 { font-size: 12px; color: var(--text-muted); }
        .summary-box p { font-size: 16px; font-weight: bold; margin-top: 5px; }
        
        /* History List */
        .history-list { max-height: 250px; overflow-y: auto; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(150,150,150,0.1); }
        .history-item:last-child { border-bottom: none; }
        .hist-info h4 { font-size: 14px; margin-bottom: 3px; }
        .hist-info span { font-size: 11px; color: var(--text-muted); display: block; }
        .odo-badge { background-color: rgba(150,150,150,0.2); padding: 2px 5px; border-radius: 4px; font-size: 10px; margin-top: 3px; display: inline-block; }
        .hist-amount { font-weight: bold; font-size: 15px; }
        .income-text { color: var(--success); }
        .expense-text { color: var(--danger); }
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: white; margin-left: 5px; }
        .bg-pickme { background-color: #007bff; }
        .bg-uber { background-color: #000000; border: 1px solid #333; }
        .bg-direct { background-color: #fd7e14; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🛵 Rider Pro</h1>
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">☀️</button>
    </div>

    <div class="card speed-card">
        <div class="card-title" style="justify-content: center; margin-bottom: 5px;">
            🛰️ Digital Speedometer
        </div>
        <div>
            <span class="speed-value" id="speedDisplay">0</span>
            <span class="speed-unit">km/h</span>
        </div>
        <div class="gps-status" id="gpsStatus">GPS සෙවීම... (Turn on Location)</div>
    </div>

    <div class="card">
        <div class="card-title">💵 ඉතුරු මුදල් (Cash Calculator)</div>
        <div class="row">
            <div class="input-group">
                <label>ගාස්තුව (Fare)</label>
                <input type="text" id="tripFare" class="calc-input active" readonly placeholder="0" onclick="setActiveInput('tripFare')">
            </div>
            <div class="input-group">
                <label>දුන් මුදල (Cash)</label>
                <input type="text" id="cashGiven" class="calc-input" readonly placeholder="0" onclick="setActiveInput('cashGiven')">
            </div>
        </div>

        <div class="quick-cash-row">
            <button onclick="addQuickCash(50)">+50</button>
            <button onclick="addQuickCash(100)">+100</button>
            <button onclick="addQuickCash(500)">+500</button>
            <button onclick="addQuickCash(1000)">+1000</button>
            <button onclick="addQuickCash(5000)">+5000</button>
        </div>

        <div class="numpad-grid">
            <button class="numpad-btn" onclick="numPress('1')">1</button>
            <button class="numpad-btn" onclick="numPress('2')">2</button>
            <button class="numpad-btn" onclick="numPress('3')">3</button>
            <button class="numpad-btn" onclick="numPress('4')">4</button>
            <button class="numpad-btn" onclick="numPress('5')">5</button>
            <button class="numpad-btn" onclick="numPress('6')">6</button>
            <button class="numpad-btn" onclick="numPress('7')">7</button>
            <button class="numpad-btn" onclick="numPress('8')">8</button>
            <button class="numpad-btn" onclick="numPress('9')">9</button>
            <button class="numpad-btn action" onclick="numPress('C')">C</button>
            <button class="numpad-btn" onclick="numPress('0')">0</button>
            <button class="numpad-btn action" onclick="numPress('<')">⌫</button>
        </div>

        <div style="text-align:center; font-size: 24px; font-weight:bold; color:var(--primary); margin-top: 15px;" id="balanceAmount">Rs. 0.00</div>
    </div>

    <div class="card">
        <div class="card-title">📊 ආදායම් සහ වියදම් ප්‍රස්තාරය</div>
        <div class="chart-container">
            <canvas id="financeChart"></canvas>
        </div>
        <div class="summary-grid">
            <div class="summary-box">
                <h3>ආදායම</h3>
                <p id="totalIncome" class="income-text">Rs. 0</p>
            </div>
            <div class="summary-box">
                <h3>වියදම</h3>
                <p id="totalExpense" class="expense-text">Rs. 0</p>
            </div>
            <div class="summary-box" style="grid-column: span 2;">
                <h3>ශුද්ධ ලාභය</h3>
                <p id="netProfit">Rs. 0</p>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">➕ ගනුදෙනු සහ මීටරය සටහන් කිරීම</div>
        <div class="row">
            <div class="input-group">
                <label>වර්ගය</label>
                <select id="transType" onchange="togglePlatform()">
                    <option value="income">ආදායම්</option>
                    <option value="expense">වියදම්</option>
                </select>
            </div>
            <div class="input-group" id="platformGroup">
                <label>Platform</label>
                <select id="platform">
                    <option value="PickMe">PickMe</option>
                    <option value="Uber">Uber</option>
                    <option value="Direct">Direct</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="input-group">
                <label>මුදල (Rs.)</label>
                <input type="number" id="transAmount" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>මීටරය (Odometer - km)</label>
                <input type="number" id="odoReading" placeholder="අත්‍යවශ්‍ය නැත">
            </div>
        </div>
        <div class="input-group">
            <label>විස්තරය</label>
            <input type="text" id="transDesc" placeholder="උදා: පෙට්‍රල්, CD 125 සර්විස් එක...">
        </div>
        <button class="btn" onclick="addTransaction()">දත්ත ඇතුළත් කරන්න</button>
    </div>

    <div class="card">
        <div class="card-title" style="justify-content: space-between;">
            <span>📝 ඉතිහාසය</span>
            <button onclick="clearHistory()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:12px; font-weight:bold;">Clear</button>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('rider_tx')) || [];
    let lastOdo = parseFloat(localStorage.getItem('rider_last_odo')) || 0;
    let activeInputId = 'tripFare'; // Default active input
    let myChart = null;

    window.onload = function() {
        updateUI();
        if(localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerText = '🌙';
        }
        initSpeedometer();
    };

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            btn.innerText = '☀️';
            localStorage.setItem('theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerText = '🌙';
            localStorage.setItem('theme', 'dark');
        }
        updateChart(); // Redraw chart for theme colors
    }

    // --- Speedometer Functions ---
    function initSpeedometer() {
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(
                (position) => {
                    document.getElementById('gpsStatus').innerText = "GPS සක්‍රීයයි (Active)";
                    document.getElementById('gpsStatus').style.color = "var(--success)";
                    
                    let speedMps = position.coords.speed;
                    if (speedMps === null || speedMps < 0) speedMps = 0;
                    
                    let speedKmh = Math.round(speedMps * 3.6);
                    document.getElementById('speedDisplay').innerText = speedKmh;
                },
                (error) => {
                    let msg = "GPS Error";
                    if(error.code === 1) msg = "Location Permission ප්‍රතික්ෂේප කර ඇත";
                    if(error.code === 2) msg = "GPS සිග්නල් නොමැත";
                    document.getElementById('gpsStatus').innerText = msg;
                },
                { enableHighAccuracy: true, maximumAge: 0 }
            );
        } else {
            document.getElementById('gpsStatus').innerText = "ඔබගේ දුරකථනය GPS සහය නොදක්වයි.";
        }
    }

    // --- Custom Keyboard Logic ---
    function setActiveInput(id) {
        document.getElementById('tripFare').classList.remove('active');
        document.getElementById('cashGiven').classList.remove('active');
        document.getElementById(id).classList.add('active');
        activeInputId = id;
    }

    function numPress(val) {
        const input = document.getElementById(activeInputId);
        if(val === 'C') {
            input.value = '';
        } else if(val === '<') {
            input.value = input.value.slice(0, -1);
        } else {
            input.value += val;
        }
        calculateBalance();
    }

    function addQuickCash(amount) {
        // Force the active input to be 'cashGiven' when a quick cash button is pressed
        setActiveInput('cashGiven');
        const input = document.getElementById('cashGiven');
        let current = parseFloat(input.value) || 0;
        input.value = current + amount;
        calculateBalance();
    }

    function calculateBalance() {
        const fare = parseFloat(document.getElementById('tripFare').value) || 0;
        const cash = parseFloat(document.getElementById('cashGiven').value) || 0;
        const balance = cash - fare;
        const display = document.getElementById('balanceAmount');
        
        if(cash === 0 && fare === 0) {
            display.innerText = "Rs. 0.00"; display.style.color = 'var(--primary)'; return;
        }
        display.innerText = balance < 0 ? `තව Rs. ${Math.abs(balance).toFixed(2)} යි` : `ඉතුරු: Rs. ${balance.toFixed(2)}`;
        display.style.color = balance < 0 ? 'var(--danger)' : 'var(--success)';
    }

    // --- Core Logic & Odometer ---
    function togglePlatform() {
        const type = document.getElementById('transType').value;
        document.getElementById('platformGroup').style.display = type === 'income' ? 'block' : 'none';
    }

    function addTransaction() {
        const type = document.getElementById('transType').value;
        const amount = parseFloat(document.getElementById('transAmount').value);
        const platform = document.getElementById('platform').value;
        const odoInput = parseFloat(document.getElementById('odoReading').value);
        const desc = document.getElementById('transDesc').value || (type === 'income' ? 'හයර්' : 'වියදමක්');

        if (isNaN(amount) || amount <= 0) return alert("නිවැරදි මුදලක් ඇතුළත් කරන්න!");

        let distanceStr = "";
        if (!isNaN(odoInput) && odoInput > 0) {
            if (lastOdo > 0 && odoInput >= lastOdo) {
                let dist = odoInput - lastOdo;
                distanceStr = ` (දුර: ${dist} km)`;
            }
            lastOdo = odoInput;
            localStorage.setItem('rider_last_odo', lastOdo);
        }

        const tx = {
            id: Date.now(),
            type: type,
            amount: amount,
            platform: type === 'income' ? platform : null,
            desc: desc,
            odoStr: !isNaN(odoInput) ? `${odoInput}km${distanceStr}` : "",
            date: new Date().toLocaleString('si-LK', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})
        };

        transactions.unshift(tx);
        localStorage.setItem('rider_tx', JSON.stringify(transactions));
        
        document.getElementById('transAmount').value = '';
        document.getElementById('transDesc').value = '';
        document.getElementById('odoReading').value = '';
        updateUI();
    }

    function updateUI() {
        let tIncome = 0, tExpense = 0;
        const listDiv = document.getElementById('historyList');
        listDiv.innerHTML = '';

        transactions.forEach(tx => {
            if(tx.type === 'income') tIncome += tx.amount;
            else tExpense += tx.amount;

            let badgeHtml = '';
            if(tx.type === 'income') {
                let badgeClass = tx.platform === 'PickMe' ? 'bg-pickme' : (tx.platform === 'Uber' ? 'bg-uber' : 'bg-direct');
                badgeHtml = `<span class="badge ${badgeClass}">${tx.platform}</span>`;
            }

            let odoHtml = tx.odoStr ? `<span class="odo-badge">📍 ${tx.odoStr}</span>` : '';

            listDiv.innerHTML += `
                <div class="history-item">
                    <div class="hist-info">
                        <h4>${tx.desc} ${badgeHtml}</h4>
                        <span>${tx.date}</span>
                        ${odoHtml}
                    </div>
                    <div class="hist-amount ${tx.type === 'income' ? 'income-text' : 'expense-text'}">
                        ${tx.type === 'income' ? '+' : '-'} Rs.${tx.amount}
                    </div>
                </div>
            `;
        });

        if(transactions.length === 0) listDiv.innerHTML = '<p style="text-align:center; color:var(--text-muted); font-size:12px;">දත්ත නොමැත</p>';

        document.getElementById('totalIncome').innerText = `Rs. ${tIncome}`;
        document.getElementById('totalExpense').innerText = `Rs. ${tExpense}`;
        document.getElementById('netProfit').innerText = `Rs. ${tIncome - tExpense}`;
        document.getElementById('netProfit').style.color = (tIncome - tExpense) >= 0 ? 'var(--success)' : 'var(--danger)';
        
        updateChart(tIncome, tExpense);
    }

    function updateChart(inc = 0, exp = 0) {
        if(transactions.length > 0) {
            inc = transactions.filter(t => t.type === 'income').reduce((a, b) => a + b.amount, 0);
            exp = transactions.filter(t => t.type === 'expense').reduce((a, b) => a + b.amount, 0);
        }

        const isDark = document.body.getAttribute('data-theme') === 'dark';
        const textColor = isDark ? '#e4e6eb' : '#1c1e21';

        const ctx = document.getElementById('financeChart').getContext('2d');
        if(myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['ආදායම්', 'වියදම්'],
                datasets: [{
                    data: [inc || 0.1, exp || 0.1],
                    backgroundColor: ['#28a745', '#dc3545'],
                    borderWidth: 0,
                    hoverOffset: 4
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: textColor, font: { family: 'Segoe UI' } } }
                }
            }
        });
    }

    function clearHistory() {
        if(confirm("සියලුම ගනුදෙනු මැකීමට අවශ්‍යද?")) {
            transactions = [];
            lastOdo = 0;
            localStorage.removeItem('rider_tx');
            localStorage.removeItem('rider_last_odo');
            updateUI();
        }
    }
</script>

</body>
</html>
